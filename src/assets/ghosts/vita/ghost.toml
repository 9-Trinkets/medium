[ghost]
name = "vita"
description = "A bundled vita ghost imported from the Arks Digital dino pack."

[provenance]
source_type = "aseprite-pack"
artist = "Arks"
attribution = "@ArksDigital — https://arks.digital/"

[sprite]
enabled = true
frame_width = 24
frame_height = 24
fps = 8
scale = 4.0
flip_horizontal = false
initial_animation = "idle"

[[sprite.animations]]
file = "resources/animations/idle.png"
name = "idle"
intent = "Idle stance animation"

[[sprite.animations]]
file = "resources/animations/move.png"
name = "move"
intent = "Walking/moving animation"

[[sprite.animations]]
file = "resources/animations/kick.png"
name = "kick"
intent = "Kicking action animation"

[[sprite.animations]]
file = "resources/animations/hurt.png"
name = "hurt"
intent = "Taking damage/hurt animation"

[[sprite.animations]]
file = "resources/animations/crouch.png"
name = "crouch"
intent = "Crouching animation"

[[sprite.animations]]
file = "resources/animations/sneak.png"
name = "sneak"
intent = "Sneaking/tiptoeing animation"
